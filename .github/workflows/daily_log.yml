name: Daily GSL Analytics Logger

on:
  schedule:
    - cron: '0 0 * * *' # Runs every night at midnight UTC
  workflow_dispatch: # Allows you to run it manually anytime for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Run Logger
        env:
          GITHUB_TOKEN: ${{ secrets.GSL_LOGGER_TOKEN }}
        run: python GSL_logger.py

      - name: Commit and Push Excel update
        run: |
          git config --global user.name "GSL Analytics Bot"
          git config --global user.email "actions@github.com"
          git add gsl_analytics_log.xlsx
          git commit -m "Auto-update analytics: $(date -u +'%Y-%m-%d')" || exit 0
          git push
